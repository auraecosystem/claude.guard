version: 2

# Only track a handful of packages for version updates.
# Security updates for all packages are handled separately by
# GitHub's Dependabot security alerts (enabled at the repo level).
#
# "Watch everything" generates weekly churn that maintainers tend to
# rubber-stamp, undermining the security goal. Default to security-only
# monitoring with explicit opt-in for packages you actively care about.

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    # 7-day cooldown: a new package version must sit in the registry for at
    # least 7 days before Dependabot proposes it. Mitigates slopsquatting —
    # an attacker publishing a malicious version that satisfies the constraint
    # gets caught by the community window before we pick it up.
    cooldown:
      default-days: 7
    versioning-strategy: auto
    allow:
      - dependency-name: "@anthropic-ai/claude-code"
      - dependency-name: "@musistudio/claude-code-router"
    groups:
      npm-tracked:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    allow:
      - dependency-name: "anthropics/claude-code-action"
      - dependency-name: "devcontainers/ci"
    groups:
      claude-and-ccr:
        patterns:
          - "anthropics/*"
          - "devcontainers/*"

  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      docker-base-images:
        patterns:
          - "*"

  # Python tools baked into the sandbox image (.devcontainer/image-requirements.txt).
  # The docker ecosystem above only bumps `FROM` digests, so without this the pinned
  # uv/detect-secrets would never be proposed for update.
  - package-ecosystem: "pip"
    directory: "/.devcontainer"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    allow:
      - dependency-name: "uv"
      - dependency-name: "detect-secrets"
    groups:
      image-python-tools:
        patterns:
          - "*"
