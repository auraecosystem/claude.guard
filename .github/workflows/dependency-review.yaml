name: dependency-review

# Lockfile diff for newly introduced vulnerable or license-incompatible
# dependencies. Requires Dependency graph + GitHub Advanced Security on
# private repos (enabled for this repo).

on:
  pull_request:

permissions:
  contents: read

concurrency:
  # Cancel the superseded run the moment a newer commit lands — on a PR head
  # and on main alike. The newest commit's run always finishes (nothing
  # supersedes it), so it is the latest *completed* run the status badge
  # reads; a bumped run that ends `cancelled` is never the newest and so never
  # reddens the badge. Safe to cancel post-merge: a pure check, no durable
  # output to drop. (Intermediate commits are cancelled, not run to completion.)
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review # required-check: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@595b5aeba73380359d98a5e087f648dbb0edce1b # v4.7.3
        with:
          fail-on-severity: moderate
