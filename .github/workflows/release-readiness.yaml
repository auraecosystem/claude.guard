name: Release readiness check

# Has the default branch accumulated enough user-facing change since the last
# release to merit cutting a new vX.Y.Z tag? Claude weighs the pending
# changelog.d/ fragments (security fixes, features, fix volume, cadence) and
# writes a verdict to the job summary. When a release IS warranted this opens a
# `release`-labeled PR and enables auto-merge, handing off to the existing
# machinery (release-prep.yaml does the bump; tag-release.yaml cuts the tag
# post-merge). It never bumps the version or pushes a tag itself. Labeling the
# PR requires a PAT (TEMPLATE_SYNC_TOKEN): a GITHUB_TOKEN-applied label would not
# fire release-prep.yaml's `labeled` trigger.

on:
  schedule:
    # Every Wednesday at 08:00 UTC
    - cron: "0 8 * * 3"
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: release-readiness
  cancel-in-progress: false

jobs:
  decide:
    name: Decide whether HEAD merits a release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        # Credentials stay persisted: open_release_pr pushes the seed branch with
        # them. A PAT (not GITHUB_TOKEN) so the `release` label this job applies
        # fires release-prep.yaml's `labeled` trigger (the Actions recursion guard).
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 # zizmor: ignore[artipacked]
        with:
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Assess release readiness with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.GH_ACTION_ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
        run: bash .github/scripts/release-readiness.sh
