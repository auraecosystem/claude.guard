name: pre-commit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run pre-commit
        id: check
        uses: pre-commit/action@v3.0.1
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Commit auto-fixes (PRs only)
        if: github.event_name == 'pull_request' && steps.check.outcome == 'failure'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Pre-commit failed but no auto-fixable changes."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-fix pre-commit issues"
          git push

      - name: Verify clean after fixes
        if: github.event_name == 'pull_request' && steps.check.outcome == 'failure'
        run: |
          pip install pre-commit
          pre-commit run --all-files
