name: "Render a perf chart from existing history"
description: >
  Re-render a perf metric's trend SVG from the history already on the
  perf-history branch (the same data — no benchmark, sandbox launch, or live API
  call), via the shared renderer (chart_image -> chart_publish). On a PR, render
  WITHOUT uploading (an unmerged PR must not overwrite the canonical chart
  objects) — it still reds on a broken render. On a merge to main, set
  upload=true to republish the canonical SVG the README embeds, refreshing the
  hosted chart to match a renderer/style change. Expects the caller to have
  checked out the repo and set up Python/uv first (and, for upload, run
  setup-chart-upload).

inputs:
  check-script:
    description: "The perf check script to invoke with --publish (e.g. bin/check-launch-perf.py)."
    required: true
  history-file:
    description: "Path the metric's history is read into (e.g. .github/launch-history.json)."
    required: true
  upload:
    description: "Upload the rendered SVG to R2 (merge to main). Leave false on a PR to render without touching the canonical objects."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Load history from the perf-history branch
      shell: bash
      env:
        HISTORY_FILE: ${{ inputs.history-file }}
      run: bin/persist-perf-history.sh read --branch perf-history --file "$HISTORY_FILE"
    # uv run --extra dev: rendering pulls in matplotlib, which only the dev extra
    # provides.
    #
    # --publish prints the markdown embed (![alt](url)) on a real render, but
    # short-circuits to a "nothing to publish" sentinel BEFORE touching matplotlib
    # when the loaded history has no datapoints — which persist-perf-history.sh
    # also produces on a transient fetch miss (it seeds []). Treating that as a
    # pass would green-light a broken renderer that never actually ran, so we
    # require the embed and fail loud otherwise.
    - name: Render the chart
      shell: bash
      env:
        CHECK_SCRIPT: ${{ inputs.check-script }}
        HISTORY_FILE: ${{ inputs.history-file }}
        UPLOAD: ${{ inputs.upload }}
      run: |
        set -euo pipefail
        # Render without uploading unless this is the publish (merge-to-main) path.
        # setup-chart-upload may itself have set SKIP_UPLOAD=1 (no R2 creds, e.g. a
        # fork) — only ADD the skip here, never clear theirs, so we can't force a
        # doomed upload.
        if [[ "$UPLOAD" != "true" ]]; then
          export CLAUDE_GUARD_CHART_SKIP_UPLOAD=1
        fi
        out="$(uv run --extra dev python3 "$CHECK_SCRIPT" --publish --history-json "$HISTORY_FILE")"
        echo "$out"
        # A real render prints the markdown embed (![alt](url)); the empty-history
        # sentinel does not. Require the embed.
        if ! grep -q '^!\[' <<<"$out"; then
          echo "::error::Chart render produced no embed — empty history (fetch miss?) or a broken renderer. Nothing was rendered, so this proves nothing." >&2
          exit 1
        fi
