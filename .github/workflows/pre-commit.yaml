name: pre-commit autofix

# Runs the full `pre-commit run --all-files` suite in CI, auto-fixing what's
# fixable and pushing the result back to the PR branch. This closes the one gap
# the local hooks leave open: edits made outside a local checkout (the GitHub web
# editor) bypass .hooks/pre-commit and .hooks/pre-push entirely. Not a required
# check — it mutates the branch, so it can't gate its own success.
# pull_request only: the job auto-commits to the PR's head branch, which has no
# meaning for a direct push to main (and main must not be auto-pushed to by CI).
on:
  pull_request:

permissions:
  contents: write

concurrency:
  # One in-flight run per branch; a new commit cancels the superseded PR run so
  # it stops holding a runner. Gated to pull_request so the post-merge main run
  # is never cancelled mid-flight.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  autofix:
    name: pre-commit autofix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # A fork PR's GITHUB_TOKEN is read-only, so the push back would fail; skip it
    # there (fork contributors run the hooks locally). Same-repo branches only.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 # zizmor: ignore[artipacked]
        with:
          # Check out the PR's head branch (not the detached merge ref) so the
          # autofix commit lands on it; full history so the push is never rejected.
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Provision, autofix, push, and verify
        run: bash .github/scripts/precommit-autofix.sh
