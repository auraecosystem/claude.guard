name: Upsert PR comment section
description: >
  Maintain one sticky PR comment shared by several workflows, each owning its
  own marker-delimited section. Does a read-modify-write of ONLY the caller's
  section (and the shared meta line), so the perf and eval workflows render into
  a single comment without clobbering each other.

inputs:
  section:
    description: Which data section to write (perf | eval).
    required: true
  body-file:
    description: Path to the Markdown file with this section's content.
    required: true
  commit-sha:
    description: Commit SHA for the shared "last updated" meta line.
    required: false
    default: ""
  github-token:
    description: Token with pull-requests/issues write.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      env:
        SECTION: ${{ inputs.section }}
        BODY_FILE: ${{ inputs.body-file }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const section = process.env.SECTION;
          const body = fs.readFileSync(process.env.BODY_FILE, 'utf8').trim();
          const sha = (process.env.COMMIT_SHA || '').slice(0, 7);
          const OUTER = '<!-- monitor-status-comment -->';
          const ORDER = ['perf', 'eval', 'meta'];
          const open = (s) => `<!-- section:${s} -->`;
          const close = (s) => `<!-- /section:${s} -->`;

          // A fresh comment carries every section delimiter (empty), so each
          // workflow can drop into its own slot regardless of who posts first.
          const skeleton = () =>
            OUTER + '\n\n' +
            ORDER.map((s) => `${open(s)}\n${close(s)}`).join('\n\n') + '\n';

          // Read one section's inner text ('' if the delimiters are absent).
          function getSection(full, s) {
            const o = open(s), c = close(s);
            const i = full.indexOf(o), j = full.indexOf(c);
            return i === -1 || j === -1 || j < i ? '' : full.slice(i + o.length, j).trim();
          }

          // Replace only the text between this section's delimiters; append the
          // delimiters if an older comment predates them.
          function setSection(full, s, content) {
            const o = open(s), c = close(s);
            const i = full.indexOf(o), j = full.indexOf(c);
            if (i === -1 || j === -1) {
              return `${full.trimEnd()}\n\n${o}\n${content}\n${c}\n`;
            }
            return full.slice(0, i + o.length) + '\n' + content + '\n' + full.slice(j);
          }

          // Fold any section the survivor is missing but a duplicate carries —
          // so collapsing a create-race into one comment never drops data.
          function mergeInto(base, other) {
            for (const s of ORDER) {
              if (!getSection(base, s) && getSection(other, s)) {
                base = setSection(base, s, getSection(other, s));
              }
            }
            return base;
          }

          const meta = `_Updated ${new Date().toISOString()}${sha ? ` · commit \`${sha}\`` : ''}._`;
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          // Convergent upsert. Two workflows can race on the one comment and
          // GitHub has no compare-and-set, so rather than prevent duplicates we
          // self-heal toward a single comment every run:
          //   * pick the earliest (lowest-id) outer-marker comment as survivor;
          //   * fold every duplicate's sections into it (lossless) and delete
          //     the duplicates;
          //   * write our own section + the shared meta line.
          // An optimistic re-read guards the survivor update (retry if another
          // run wrote in between); a stale duplicate-delete that 404s is fine —
          // its content was already merged in.
          for (let attempt = 0; attempt < 5; attempt++) {
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const mine = comments
              .filter((c) => c.body && c.body.includes(OUTER))
              .sort((a, b) => a.id - b.id);
            const survivor = mine[0] || null;
            const dups = mine.slice(1);

            let next = survivor ? survivor.body : skeleton();
            for (const d of dups) next = mergeInto(next, d.body);
            next = setSection(next, section, body);
            next = setSection(next, 'meta', meta);

            try {
              if (survivor) {
                const fresh = await github.rest.issues.getComment({
                  owner, repo, comment_id: survivor.id,
                });
                if (fresh.data.body !== survivor.body) continue; // raced; retry
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: survivor.id, body: next,
                });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: next });
              }
              // Collapse any duplicates now their sections live in the survivor.
              for (const d of dups) {
                await github.rest.issues
                  .deleteComment({ owner, repo, comment_id: d.id })
                  .catch(() => {}); // already gone / raced — fine
              }
              return;
            } catch (e) {
              if (attempt === 4) throw e;
              await new Promise((r) => setTimeout(r, 500 * (attempt + 1)));
            }
          }
          core.warning('upsert-comment-section: gave up after 5 attempts');
