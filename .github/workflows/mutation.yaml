name: Mutation testing (JS)

# Stryker mutation testing over the security-critical JS hooks (the sanitizers,
# the invisible-char scanner, the deny-rule matcher, the monitor-response
# scrubber, the WebFetch classifier). It runs automatically on every PR that
# touches a mutated file (or its config), one shard per mutated file so wall-time
# stays in the few-minute range; PRs that change none of those skip it (the
# `report` job is the required check and reports success on a skip, so an
# unrelated PR is never blocked). The score floor lives in stryker.conf.json
# (thresholds.break) and is enforced per file.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # Path-gate: a workflow-level `paths:` filter would never report and hang the
  # required check, so gate at the job level instead (see decide-reusable.yaml).
  decide:
    name: Decide (JS mutation)
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      paths-regex: '^(\.claude/hooks/.*\.mjs|stryker\.conf\.json|package\.json|pnpm-lock\.yaml|\.github/workflows/mutation\.yaml)$'

  # The shard list is derived from stryker.conf.json's `mutate` array so the two
  # can never drift — one matrix entry per mutated file.
  prep:
    name: Prepare mutation shards
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      files: ${{ steps.shards.outputs.files }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: shards
        run: echo "files=$(jq -c '.mutate' stryker.conf.json)" >> "$GITHUB_OUTPUT"

  mutate:
    name: Stryker (${{ matrix.file }})
    needs: [decide, prep]
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.prep.outputs.files) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      # Python: sanitize-output.mjs spawns redact-secrets.py inside its tests, so
      # the covering suite needs a Python toolchain to pass.
      - uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"
      - name: Mutate ${{ matrix.file }}
        env:
          MUTATE_FILE: ${{ matrix.file }}
        run: pnpm exec stryker run --mutate "$MUTATE_FILE"
      - name: Upload mutation report
        if: always() && hashFiles('reports/mutation/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-js-${{ strategy.job-index }}
          path: reports/mutation/
          retention-days: 14

  # Required status check: register THIS job's name in branch protection (not the
  # matrix job's). always() so it reports red on a shard failure instead of being
  # skipped, while the decide gate still short-circuits it on unrelated PRs.
  report:
    name: Mutation testing (Stryker)
    needs: [decide, mutate]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/report-job-result
        with:
          run: ${{ needs.decide.outputs.run }}
          result: ${{ needs.mutate.result }}
          skip-message: "Skipped: no mutated JS hook changed"
